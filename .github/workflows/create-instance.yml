name: Create OCI instance

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-dev

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i "s|OCI_USER_ID=.*|OCI_USER_ID=${{ secrets.OCI_USER_OCID }}|" .env
          sed -i "s|OCI_TENANCY_ID=.*|OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_OCID }}|" .env
          sed -i "s|OCI_KEY_FINGERPRINT=.*|OCI_KEY_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}|" .env
          sed -i "s|OCI_REGION=.*|OCI_REGION=${{ secrets.OCI_REGION }}|" .env
          sed -i "s|OCI_AVAILABILITY_DOMAIN=.*|OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}|" .env
          sed -i "s|OCI_SUBNET_ID=.*|OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}|" .env
          sed -i "s|OCI_IMAGE_ID=.*|OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}|" .env
          sed -i "s|OCI_SSH_PUBLIC_KEY=.*|OCI_SSH_PUBLIC_KEY=\"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"|" .env
          sed -i "s|OCI_PRIVATE_KEY_FILENAME=.*|OCI_PRIVATE_KEY_FILENAME=private_key.pem|" .env
          sed -i "s|OCI_BOOT_VOLUME_SIZE_IN_GBS=.*|OCI_BOOT_VOLUME_SIZE_IN_GBS=200|" .env
          echo "OCI_COMPARTMENT_ID=${{ secrets.OCI_TENANCY_OCID }}" >> .env
          printf '%b' '${{ secrets.OCI_PRIVATE_KEY }}' > private_key.pem
          echo "=== Vérification clé privée ==="
          head -3 private_key.pem
          tail -3 private_key.pem
          
          - name: Run script
          run: |
            echo "=== Test API OCI ==="
            curl -s "https://iaas.eu-paris-1.oraclecloud.com/20160918/instances?compartmentId=${{ secrets.OCI_TENANCY_OCID }}&limit=1" || true
            echo "=== PHP Output ==="
            OUTPUT=$(php index.php 2>&1)
            echo "=== OUTPUT START ==="
            echo "$OUTPUT"
            echo "=== OUTPUT END ==="
            if echo "$OUTPUT" | grep -q "ocid1.instance"; then
              echo "INSTANCE_CREATED=true" >> $GITHUB_ENV
            fi

      - name: Disable workflow if instance created
        if: env.INSTANCE_CREATED == 'true'
        run: |
          echo "Instance created! Disabling workflow..."
          curl -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/create-instance.yml/disable
